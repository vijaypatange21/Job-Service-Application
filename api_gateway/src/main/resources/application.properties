spring.application.name=api_gateway
server.port=8084
spring.profiles.active=dev

# JWT validation must match authms token signing settings.
gateway.security.jwt.issuer=${JWT_ISSUER:jobapp-authms}
gateway.security.jwt.secret=${JWT_SECRET:change-this-dev-only-secret-key-change-this-dev-only-secret-key}
gateway.internal.secret=${INTERNAL_SERVICE_SECRET:change-this-internal-service-secret}

# Redis supports token blacklist checks and Gateway rate limiting.
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# Eureka Client Configuration
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# zipkin
management.tracing.sampling.probability=1.0
management.endpoints.web.exposure.include=health,info,metrics

# gateway routes
spring.cloud.gateway.server.webflux.routes[0].id=authms
spring.cloud.gateway.server.webflux.routes[0].uri=http://localhost:8085
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=RewritePath=/auth/(?<segment>.*), /api/v1/auth/$\\{segment}
spring.cloud.gateway.server.webflux.routes[0].filters[1].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.redis-rate-limiter.replenishRate=10
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.redis-rate-limiter.burstCapacity=20
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.key-resolver=#{@principalOrIpKeyResolver}

spring.cloud.gateway.server.webflux.routes[1].id=companyms
spring.cloud.gateway.server.webflux.routes[1].uri=http://localhost:8081
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/companies/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=JwtClaimsRelay
spring.cloud.gateway.server.webflux.routes[1].filters[1].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[1].filters[1].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.server.webflux.routes[1].filters[1].args.redis-rate-limiter.burstCapacity=40
spring.cloud.gateway.server.webflux.routes[1].filters[1].args.key-resolver=#{@principalOrIpKeyResolver}

spring.cloud.gateway.server.webflux.routes[2].id=jobms
spring.cloud.gateway.server.webflux.routes[2].uri=http://localhost:8082
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/jobs/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=JwtClaimsRelay
spring.cloud.gateway.server.webflux.routes[2].filters[1].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[2].filters[1].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.server.webflux.routes[2].filters[1].args.redis-rate-limiter.burstCapacity=40
spring.cloud.gateway.server.webflux.routes[2].filters[1].args.key-resolver=#{@principalOrIpKeyResolver}

spring.cloud.gateway.server.webflux.routes[3].id=reviewms
spring.cloud.gateway.server.webflux.routes[3].uri=http://localhost:8083
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/reviews/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=JwtClaimsRelay
spring.cloud.gateway.server.webflux.routes[3].filters[1].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[3].filters[1].args.redis-rate-limiter.replenishRate=20
spring.cloud.gateway.server.webflux.routes[3].filters[1].args.redis-rate-limiter.burstCapacity=40
spring.cloud.gateway.server.webflux.routes[3].filters[1].args.key-resolver=#{@principalOrIpKeyResolver}

spring.cloud.gateway.server.webflux.routes[4].id=authms_admin
spring.cloud.gateway.server.webflux.routes[4].uri=http://localhost:8085
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/admin/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=RewritePath=/admin/(?<segment>.*), /api/v1/admin/$\\{segment}
spring.cloud.gateway.server.webflux.routes[4].filters[1]=JwtClaimsRelay
spring.cloud.gateway.server.webflux.routes[4].filters[2].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[4].filters[2].args.redis-rate-limiter.replenishRate=5
spring.cloud.gateway.server.webflux.routes[4].filters[2].args.redis-rate-limiter.burstCapacity=10
spring.cloud.gateway.server.webflux.routes[4].filters[2].args.key-resolver=#{@principalOrIpKeyResolver}

spring.cloud.gateway.server.webflux.routes[5].id=service_registry
spring.cloud.gateway.server.webflux.routes[5].uri=http://localhost:8761
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/eureka/main
spring.cloud.gateway.server.webflux.routes[5].filters[0]=SetPath=/

spring.cloud.gateway.server.webflux.routes[6].id=service_registry_static
spring.cloud.gateway.server.webflux.routes[6].uri=http://localhost:8761
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/eureka/**

# logging
logging.pattern.level=%5p [${spring.application.name},%X{correlationId:-}]
logging.level.root=INFO
logging.level.org.springframework.cloud.gateway=TRACE
logging.level.org.springframework.web=TRACE

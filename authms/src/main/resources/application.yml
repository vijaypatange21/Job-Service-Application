spring:
  application:
    name: authms
  profiles:
    active: dev
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8080}
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://localhost:5432/auth_db}
    username: ${AUTH_DB_USERNAME:user}
    password: ${AUTH_DB_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    default-property-inclusion: non_null

server:
  port: ${AUTHMS_PORT:8085}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: Authentication microservice for JobApp
    version: 1.0.0

security:
  jwt:
    issuer: ${JWT_ISSUER:jobapp-authms}
    secret: ${JWT_SECRET:change-this-dev-only-secret-key-change-this-dev-only-secret-key}
    access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:900000}
    refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:604800000}

logging:
  pattern:
    level: "%5p [${spring.application.name},%X{correlationId:-}]"
  level:
    root: INFO
    com.authms: DEBUG

---
spring:
  config:
    activate:
      on-profile: docker
    import: optional:configserver:http://config-server:8080
  datasource:
    url: ${AUTH_DB_URL:jdbc:postgresql://postgres:5432/auth_db}
  data:
    redis:
      host: ${REDIS_HOST:redis}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_SERVER_URL:http://servicereg:8761/eureka/}
